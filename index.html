<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anh Nhớ Em Rồi</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Merriweather:wght@300;400;700&display=swap');

body {
    font-family: 'Merriweather', serif;
}

.title-font {
    font-family: 'Playfair Display', serif;
}

.content {
    font-size: 19px;
    line-height: 2.05;
    max-width: 640px;
    margin: 0 auto;
    color: #d6d3d1;
    letter-spacing: 0.3px;
    text-align: left;
    padding: 0 10px;
}

.content p {
    text-indent: 2em;
    margin-bottom: 16px;
}

.content p.short {
    text-indent: 0;
    text-align: center;
}

/* Nút đọc */
#readBtn.reading {
    background: #ff4d4d;
    box-shadow: 0 0 12px rgba(255,77,77,0.8);
}

/* Sidebar */
.sidebar {
    transform: translateX(-100%);
}
.sidebar.open {
    transform: translateX(0);
}

@media (min-width: 1024px) {
    .sidebar {
        transform: translateX(0) !important;
        position: relative !important;
    }
}

#overlay {
    display: none;
}
#overlay.show {
    display: block;
}

.scroll-progress {
    position: fixed;
    top: 0;
    left: 0;
    height: 4px;
    background: linear-gradient(to right, #ff4d4d, #ff8c8c);
    z-index: 50;
    width: 0;
}
</style>
</head>

<body class="bg-[#0f0f0f] text-zinc-300 min-h-screen flex">

<div id="progress" class="scroll-progress"></div>
<div id="overlay" class="fixed inset-0 bg-black/50 z-40"></div>

<!-- Sidebar -->
<div id="sidebar" class="sidebar w-72 bg-zinc-900 border-r border-zinc-800 flex flex-col h-screen fixed lg:relative z-50 transition-transform duration-300">

    <div class="p-6 border-b border-zinc-800 flex items-center gap-3">
        <i class="fa-solid fa-book-open text-3xl text-rose-500"></i>
        <h1 class="title-font text-2xl text-white">Anh Nhớ Em Rồi</h1>
    </div>

    <div id="chapterList" class="flex-1 overflow-y-auto px-3 py-2 space-y-1"></div>

    <div class="p-4 border-t border-zinc-800 text-center text-sm text-zinc-500">
        Tổng <span id="totalChapters" class="text-rose-400">0</span> chương
    </div>
</div>

<!-- Main -->
<div class="flex-1 flex flex-col h-screen">

    <div class="h-14 border-b border-zinc-800 bg-zinc-900 flex items-center px-6 justify-between">
        <button onclick="toggleSidebar()" class="lg:hidden text-xl">
            <i class="fa-solid fa-bars"></i>
        </button>

        <div id="currentTitle" class="text-lg text-zinc-300"></div>

        <!-- 🔊 NÚT ĐỌC -->
        <button onclick="toggleRead()" id="readBtn"
            class="w-10 h-10 flex items-center justify-center bg-zinc-800 hover:bg-zinc-700 rounded-xl text-lg">
            🔊
        </button>
    </div>

    <div id="readingArea" class="flex-1 overflow-y-auto px-6 py-10">

        <div id="title" class="title-font text-4xl text-center mb-10 text-rose-300"></div>

        <div id="content" class="content"></div>

    </div>

    <div class="h-14 border-t border-zinc-800 flex items-center justify-between px-6">
        <button onclick="prevChapter()">← Trước</button>
        <div id="chapterInfo"></div>
        <button onclick="nextChapter()">Sau →</button>
    </div>

</div>

<script>
let chapters = [];
let currentIndex = -1;

fetch("chapters.json")
.then(res => res.json())
.then(data => {
    chapters = data;
    document.getElementById("totalChapters").innerText = data.length;

    const list = document.getElementById("chapterList");

    data.forEach((file, index) => {
        const div = document.createElement("div");
        div.className = "chapter px-4 py-3 cursor-pointer hover:bg-zinc-800 rounded-xl";
        div.innerText = file.replace(".txt", "");
        div.onclick = () => loadChapter(file, index, div);
        list.appendChild(div);
    });

    const saved = localStorage.getItem("lastChapter");
    if (saved !== null) {
        setTimeout(() => {
            document.querySelectorAll(".chapter")[saved]?.click();
        }, 300);
    }
});

function loadChapter(file, index, el) {
    fetch(file)
    .then(res => res.text())
    .then(data => {

        const content = document.getElementById("content");

        content.innerHTML = data
            .split("\n")
            .map(line => {
                line = line.trim();
                if (!line) return "";

                if (line.length < 40) {
                    return `<p class="short">${line}</p>`;
                }

                return `<p>${line}</p>`;
            })
            .join("");

        document.getElementById("title").innerText = file.replace(".txt", "");
        document.getElementById("currentTitle").innerText = file.replace(".txt", "");

        document.querySelectorAll(".chapter").forEach(c => c.classList.remove("bg-rose-900"));
        el.classList.add("bg-rose-900");

        currentIndex = index;
        document.getElementById("chapterInfo").innerText = `${index+1}/${chapters.length}`;

        document.getElementById("readingArea").scrollTop = 0;

        localStorage.setItem("lastChapter", index);

        speechSynthesis.cancel(); // dừng đọc khi đổi chương

        closeSidebar();
    });
}

// 🔊 TEXT TO SPEECH
let isReading = false;
let utterance = null;

function toggleRead() {
    const btn = document.getElementById("readBtn");

    if (isReading) {
        speechSynthesis.cancel();
        isReading = false;
        btn.classList.remove("reading");
        btn.innerHTML = "🔊";
        return;
    }

    const text = document.getElementById("content").innerText;

    utterance = new SpeechSynthesisUtterance(text);

    const voices = speechSynthesis.getVoices();
    const viVoice = voices.find(v => v.lang.includes("vi"));

    if (viVoice) utterance.voice = viVoice;

    utterance.rate = 1;
    utterance.pitch = 1;

    speechSynthesis.speak(utterance);

    isReading = true;
    btn.classList.add("reading");
    btn.innerHTML = "⏸";

    utterance.onend = () => {
        isReading = false;
        btn.classList.remove("reading");
        btn.innerHTML = "🔊";
    };
}

// fix load voice
speechSynthesis.onvoiceschanged = () => {};

// Scroll progress
const readingArea = document.getElementById("readingArea");

readingArea.addEventListener("scroll", () => {
    const scrollTop = readingArea.scrollTop;
    const scrollHeight = readingArea.scrollHeight - readingArea.clientHeight;
    const progress = (scrollTop / scrollHeight) * 100;

    document.getElementById("progress").style.width = progress + "%";

    localStorage.setItem("scrollPos", scrollTop);
});

// Sidebar
function toggleSidebar() {
    document.getElementById("sidebar").classList.toggle("open");
    document.getElementById("overlay").classList.toggle("show");
}

function closeSidebar() {
    document.getElementById("sidebar").classList.remove("open");
    document.getElementById("overlay").classList.remove("show");
}

document.getElementById("overlay").onclick = closeSidebar;

// Next Prev
function prevChapter() {
    if (currentIndex > 0)
        document.querySelectorAll(".chapter")[currentIndex - 1].click();
}

function nextChapter() {
    if (currentIndex < chapters.length - 1)
        document.querySelectorAll(".chapter")[currentIndex + 1].click();
}
</script>

</body>
</html>
